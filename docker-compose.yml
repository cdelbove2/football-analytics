services:
  postgres:
    image: postgres:16
    container_name: football-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: football
      POSTGRES_PASSWORD: football
      POSTGRES_DB: football
    ports:
      - "5432:5432"
    volumes:
      - football_pgdata:/var/lib/postgresql/data

volumes:
  football_pgdata:
